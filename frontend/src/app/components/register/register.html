<div class="auth-container">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="auth-card card-glow">
    <div class="auth-header">
      <h2 class="auth-title">Crear cuenta</h2>
      <p class="auth-subtitle">Únete a nosotros hoy</p>
    </div>

    <form (ngSubmit)="registrarUsuario()" #registerForm="ngForm" class="auth-form">
      <div class="form-group">
        <label for="nombre">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          Nombre completo
        </label>
        <input
          type="text"
          id="nombre"
          name="nombre"
          [(ngModel)]="user.nombre"
          required
          placeholder="Juan Pérez"
          class="input-field"
        />
      </div>

      <div class="form-group">
        <label for="correo">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="20" height="16" x="2" y="4" rx="2"></rect>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
          </svg>
          Correo electrónico
        </label>
        <input
          type="email"
          id="correo"
          name="correo"
          [(ngModel)]="user.correo"
          required
          placeholder="tu@email.com"
          class="input-field"
        />
      </div>

      <div class="form-group">
        <label for="telefono">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
          </svg>
          Teléfono
        </label>
        <input
          type="text"
          id="telefono"
          name="telefono"
          [(ngModel)]="user.telefono"
          placeholder="+52 555 123 4567"
          class="input-field"
        />
      </div>

      <div class="form-group">
        <label for="tipo_persona">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
          Tipo de cuenta
        </label>
        <select
          id="tipo_persona"
          name="tipo_persona"
          [(ngModel)]="user.tipo_persona"
          required
          class="input-field"
        >
          <option value="" disabled selected>Selecciona una opción</option>
          <option value="cliente">Cliente</option>
          <option value="empleado">Empleado</option>
        </select>
      </div>

      <div *ngIf="user.tipo_persona === 'empleado'" class="form-group conditional-field">
        <label for="departamentoid">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"></path>
            <path d="m9 22 3-5h6l3 5"></path>
          </svg>
          Departamento
        </label>
        <select
          id="departamentoid"
          name="departamentoid"
          [(ngModel)]="user.departamentoid"
          required
          class="input-field"
        >
          <option value="" disabled selected>Selecciona un departamento</option>
          <option *ngFor="let dep of departamentos" [value]="dep.departamentoid">
            {{ dep.nombredepartamento }}
          </option>
        </select>
      </div>

      <div class="form-group">
        <label for="password">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          Contraseña
        </label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="user.password"
          required
          placeholder="••••••••"
          class="input-field"
        />
      </div>

      <button type="submit" [disabled]="registerForm.invalid" class="btn-primary auth-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <line x1="19" x2="19" y1="8" y2="14"></line>
          <line x1="22" x2="16" y1="11" y2="11"></line>
        </svg>
        Crear cuenta
      </button>
    </form>

    <div class="auth-footer">
      <p>¿Ya tienes cuenta? <a routerLink="/login" class="auth-link">Inicia sesión aquí</a></p>
    </div>
  </div>
</div>
