<div class="auth-container">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="auth-card card-glow">
    <div class="auth-header">
      <h2 class="auth-title">Bienvenido de nuevo</h2>
      <p class="auth-subtitle">Inicia sesión para continuar</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="auth-form">
      <div class="form-group">
        <label for="correo">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="20" height="16" x="2" y="4" rx="2"></rect>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
          </svg>
          Correo electrónico
        </label>
        <input
          type="email"
          id="correo"
          name="correo"
          [(ngModel)]="correo"
          required
          placeholder="tu@email.com"
          class="input-field"
        />
      </div>

      <div class="form-group">
        <label for="password">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          Contraseña
        </label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          required
          placeholder="••••••••"
          class="input-field"
        />
      </div>

      <button type="submit" [disabled]="loginForm.invalid" class="btn-primary auth-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"></path>
          <path d="M12 5l7 7-7 7"></path>
        </svg>
        Iniciar sesión
      </button>

      <p *ngIf="mensaje" class="auth-message">{{ mensaje }}</p>
    </form>

    <div class="auth-footer">
      <p>¿No tienes cuenta? <a routerLink="/register" class="auth-link">Regístrate aquí</a></p>
    </div>
  </div>
</div>
