<div class="page-container">
  <div class="form-card">
    <div class="card-header">
      <div>
        <h3 class="card-title">Nuevo Presupuesto</h3>
        <p class="card-subtitle">Asigna presupuesto a un proyecto</p>
      </div>
    </div>

    <form (ngSubmit)="agregarPresupuesto()" [formGroup]="presupuestoForm">
      <div class="form-row">
        <div class="form-group">
          <label class="field-label">Proyecto</label>
          <select class="input-field" formControlName="proyectoid">
            <option value="">Seleccione un proyecto</option>
            <option *ngFor="let p of proyectos" [value]="p.proyectoid">{{ p.nombreproyecto }}</option>
          </select>
        </div>

        <div class="form-group">
          <label class="field-label">Monto</label>
          <input type="number" class="input-field" formControlName="monto" min="1" placeholder="Ingrese el monto">
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary" [disabled]="presupuestoForm.invalid">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          Agregar Presupuesto
        </button>
      </div>
    </form>
  </div>

  <div class="card">
    <div class="card-header">
      <div>
        <h3 class="card-title">Lista de Presupuestos</h3>
        <p class="card-subtitle">{{ presupuestos.length }} presupuestos</p>
      </div>
    </div>

    <div *ngIf="cargando" class="loading">
      <div class="loading-spinner"></div>
      <p>Cargando datos...</p>
    </div>

    <table class="data-table" *ngIf="!cargando && presupuestos.length > 0">
      <thead>
        <tr>
          <th>Proyecto</th>
          <th>Monto</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let p of presupuestos">
          <td>{{ p.nombreproyecto || p.proyectoid }}</td>
          <td>{{ p.monto | currency:'USD':'symbol':'1.0-0' }}</td>
        </tr>
      </tbody>
    </table>

    <div *ngIf="!cargando && presupuestos.length === 0" class="empty-state">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <line x1="12" x2="12" y1="2" y2="22"/>
        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
      </svg>
      <p>No hay presupuestos registrados</p>
    </div>
  </div>
</div>
